<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>NYC Ballot Explorer</title>

<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
  margin:0;
  font-family: Georgia, serif;
  background:#f5f5f2;
  color:#111;
}

.container{
  max-width:1000px;
  margin:0 auto;
  padding:40px 20px;
}

h1{ font-size:48px; margin-bottom:10px; }

p{ color:#555; }

.filters{
  display:flex;
  gap:12px;
  margin:20px 0 30px;
  flex-wrap:wrap;
}

select, button{
  padding:10px;
  font-size:16px;
}

.card{
  background:#fff;
  border:1px solid #ddd;
  padding:20px;
  margin-bottom:16px;
}

.office{
  font-size:22px;
  font-weight:700;
}

.meta{
  color:#666;
  font-size:13px;
  margin:6px 0 12px;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid #aaa;
  font-size:12px;
}

.contested{
  background:#111;
  color:#fff;
  border-color:#111;
}

.ballot{
  border:2px solid #111;
  background:#fafafa;
  padding:14px;
  margin-top:10px;
}

.ballot-title{
  text-align:center;
  font-size:12px;
  letter-spacing:.12em;
  margin-bottom:10px;
  font-weight:700;
}

.candidate{
  display:flex;
  align-items:center;
  gap:10px;
  margin:8px 0;
}

.circle{
  width:14px;
  height:14px;
  border:2px solid #111;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="container">

<h1>NYC Ballot Explorer</h1>
<p>Select borough and district.</p>

<div class="filters">

  <select id="borough">
    <option value="">Select borough</option>
  </select>

  <select id="district">
    <option value="">Select district</option>
  </select>

  <button onclick="renderBallot()">Show Ballot</button>

</div>

<div id="output"></div>

</div>

<>
<script>

let data = [];

// ---------------------- LOAD CSV ----------------------

async function load() {
  try {
    const res = await fetch("races_clean.csv", { cache: "no-store" });

    if (!res.ok) throw new Error("HTTP " + res.status);

    const csv = await res.text();

    const parsed = Papa.parse(csv, {
      header: true,
      skipEmptyLines: true,
      transformHeader: h =>
        h.replace(/\uFEFF/g, "").trim()
    });

    data = parsed.data.map(row => {
      const clean = {};
      Object.keys(row).forEach(k => {
        clean[k.replace(/\uFEFF/g, "").trim()] = row[k];
      });
      return clean;
    });

    console.log("Loaded rows:", data.length);
    console.log("Sample rows:", data.slice(0, 3));

    buildDropdowns();

  } catch (err) {
    console.error("CSV load failed:", err);
    document.getElementById("output").innerHTML =
      "<p style='color:red'>Failed to load races_clean.csv</p>";
  }
}

load();

// ---------------------- BUILD DROPDOWNS ----------------------

function buildDropdowns(){

  const boroughSel = document.getElementById("borough");
  const districtSel = document.getElementById("district");

  const boroughs = [...new Set(
    data.map(d => (d.Borough || "").trim())
  )].filter(Boolean).sort();

  boroughSel.innerHTML = `<option value="">All boroughs</option>`;

  boroughs.forEach(b => {
    const opt = document.createElement("option");
    opt.value = b;
    opt.textContent = b;
    boroughSel.appendChild(opt);
  });

  boroughSel.onchange = () => {

    const borough = boroughSel.value;

    const filtered = borough
      ? data.filter(d => (d.Borough || "").trim() === borough)
      : data;

    const districts = [...new Set(
      filtered.map(d => (d.district_id ?? "").toString().trim())
    )]
    .filter(d => d !== "")
    .sort((a,b)=>Number(a)-Number(b));

    districtSel.innerHTML = `<option value="">All districts</option>`;

    districts.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      districtSel.appendChild(opt);
    });
  };
}

// ---------------------- SAFE CANDIDATE PARSING ----------------------

function parseCandidates(raw) {
  if (!raw) return [];

  if (Array.isArray(raw)) return raw;

  if (typeof raw === "string") {
    try {
      return JSON.parse(raw.replace(/'/g, '"'));
    } catch {
      return raw.split("||").length > 1
        ? raw.split("||")
        : raw.split(",").map(s => s.trim());
    }
  }

  return [];
}

// ---------------------- RENDER BALLOT ----------------------

function renderBallot(){

  const borough = document.getElementById("borough").value;
  const district = document.getElementById("district").value;

  let filtered = data;

  // ---------------------- BOROUGH FILTER (FIXED) ----------------------
  if (borough) {
    filtered = filtered.filter(d => {
      const b = (d.Borough || "").trim();

      // allow common NYC variations
      return b === borough || b === "New York" || b === "NYC";
    });
  }

  // ---------------------- DISTRICT FILTER (CRITICAL FIX) ----------------------
  if (district) {
    filtered = filtered.filter(d => {

      const type = (d.district_type || "").toLowerCase();
      const id = (d.district_id || "").toString().trim();

      const isCitywide =
        type === "citywide" ||
        id === "" ||
        (d.district_label || "").toLowerCase().includes("citywide");

      // keep:
      // 1. exact district match
      // 2. ALL citywide races
      return id === district || isCitywide;
    });
  }

  if(filtered.length === 0){
    document.getElementById("output").innerHTML =
      "<p>No races found.</p>";
    return;
  }

  let html = `<h2>${borough || "All Boroughs"} · ${district ? "District " + district : "All Districts"}</h2>`;

  filtered.forEach(r => {

    const candidates = parseCandidates(r.candidates);

    const office = r["Office / Contest"] || "Unknown Office";

    const districtLabel = r.district_label || "";

    const type = (r.district_type || "").toLowerCase();

    const id = (r.district_id || "").toString().trim();

    const scope =
      type === "citywide" || id === ""
        ? "Citywide / At-Large"
        : `District ${id}`;

    html += `
      <div class="card">

        <div class="office">
          ${office}
        </div>

        <div class="meta">
          ${districtLabel} · ${scope}
        </div>

        <span class="badge ${
          String(r.contested).toLowerCase() === "true"
          ? "contested" : ""
        }">
          ${
            String(r.contested).toLowerCase() === "true"
            ? "Contested" : "Uncontested"
          }
        </span>

        <div class="ballot">

          <div class="ballot-title">
            OFFICIAL SAMPLE BALLOT
          </div>
    `;

    candidates.forEach(c => {
      html += `
        <div class="candidate">
          <span class="circle"></span>
          ${c}
        </div>
      `;
    });

    html += `</div></div>`;
  });

  document.getElementById("output").innerHTML = html;
}

</script>
</body>
</html>
